<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Forecast</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      width: 60%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }
    th {
      background-color: #f4f4f4;
    }
  </style>
</head>
<body>

<h2>Weather Forecast</h2>
<button onclick="loadWeather()">Load Weather</button>

<br><br>

<table id="weatherTable">
  <thead>
    <tr>
      <th>Date</th>
      <th>Temp (°C)</th>
      <th>Temp (°F)</th>
      <th>Summary</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadWeather() {
  const response = await fetch("http://35.154.4.219:5000/weatherforecast");
  const data = await response.json();

  const tableBody = document.querySelector("#weatherTable tbody");
  tableBody.innerHTML = "";

  data.forEach(item => {
    tableBody.innerHTML += `
      <tr>
        <td>${item.date}</td>
        <td>${item.temperatureC}</td>
        <td>${item.temperatureF}</td>
        <td>${item.summary}</td>
      </tr>`;
  });
}
</script>

</body>
</html>
